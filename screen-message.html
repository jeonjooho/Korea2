<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Message Screen (9:16)</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;background:#000;overflow:hidden;font-family:Arial,sans-serif}
#stage{position:relative;height:100dvh;width:100dvh;max-width:100vw;aspect-ratio:9/16;margin:0 auto;overflow:hidden;background:#eaf5ff}
#content{position:absolute;left:0;top:0;width:1080px;height:1920px;transform-origin:0 0;overflow:hidden}
.bgLayer{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;opacity:0}
#titleArea,#subtitleArea{position:absolute;text-align:center;display:flex;align-items:center;justify-content:center;line-height:1.2;word-break:keep-all;overflow-wrap:anywhere;padding:6px 10px;overflow:hidden}
#largeBox{position:absolute;border-radius:26px;overflow:hidden;box-shadow:0 14px 40px rgba(60,100,160,.25)}
#list{position:absolute;left:0;top:0;width:100%}
.entry{position:relative;box-sizing:border-box;border-radius:20px;overflow:hidden;background-size:cover;background-position:center;padding:20px 24px}
.entry .rowTop{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.entry .name{font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entry .org{font-weight:400;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:.85}
.entry .message{margin-top:8px;font-weight:800;line-height:1.3;overflow-wrap:anywhere}
.entry .handwrittenMessage{width:100%;max-height:220px;object-fit:contain;margin-top:8px}
.entry .metaRow{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.entry .signature img{max-height:44px;object-fit:contain}
.entry .time{font-weight:400}
#boothSelfieArea{position:absolute;overflow:hidden;pointer-events:none}
#boothSelfieList{position:relative;width:100%;height:100%;display:flex;gap:14px;align-items:center}
.boothSelfiePhoto{position:relative;overflow:hidden;border-radius:16px;box-shadow:0 8px 20px rgba(20,40,80,.22);background:#fff;flex:none}
.boothSelfiePhoto img{width:100%;height:100%;object-fit:cover;display:block}
#fullscreenBtn{position:fixed;right:14px;bottom:14px;z-index:20;border:0;border-radius:10px;padding:10px 14px;background:#17335f;color:white;font-weight:900;cursor:pointer;font-size:13px}
</style></head><body>
<div id="stage">
  <div id="content">
    <div id="bgLayerA" class="bgLayer"></div>
    <div id="bgLayerB" class="bgLayer"></div>
    <div id="titleArea"><div id="titleText"></div></div>
    <div id="subtitleArea"><div id="subtitleText"></div></div>
    <div id="largeBox"><div id="list"></div></div>
    <div id="boothSelfieArea"><div id="boothSelfieList"></div></div>
  </div>
</div>
<button id="fullscreenBtn">Full Screen</button>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="firebase-config-message.js"></script>
<script>
/* Message-only display screen, redesigned for a 9:16 (portrait) canvas.
   Reuses the ORIGINAL "visitorBook/..." Firebase path (entries, settings,
   boothSelfies), so existing messages show up here immediately.

   NOTE — simplifications vs. the original screen.html: this build keeps
   only the straightforward scrolling single-column list layout (the
   original's "random scatter" / "vertical2 popup" / "polaroid" layout
   modes and per-file LOCAL background pickers are not included here,
   since they were tuned for the 16:9 canvas). Ask if you'd like any of
   those added back for the portrait version. */
const DEFAULT_SETTINGS = {
  screenTitle: "Welcome to the Republic of Korea booth!",
  screenSubtitle: "Your messages inspire us to build a safer, better future.",
  screenTitleFont: "Arial", screenTitleSize: 46, screenTitleColor: "#08377d", screenTitleWeight: "800",
  screenSubtitleFont: "Arial", screenSubtitleSize: 24, screenSubtitleColor: "#142855", screenSubtitleWeight: "400",
  screenBgColor: "#eaf5ff", screenBgImages: "", screenBgInterval: 10, screenBgFadeDuration: 1.5,
  visibleEntryCount: 5,
  messageColorMode: "fixed", messageFixedColor: "#0752c9",
  messageRandomPalette: "#0752c9,#0b7a53,#c2410c,#7c3aed,#be123c,#0369a1,#a16207",
  scrollEnabled: "yes", scrollSpeed: 60,
  // screenTitleArea / screenSubtitleArea / largeBox position & size are all percent of the 1080x1920 canvas (i.e. percent of the screen)
  screenTitleAreaX: 4, screenTitleAreaY: 3, screenTitleAreaWidth: 92, screenTitleAreaHeight: 12,
  screenSubtitleAreaX: 4, screenSubtitleAreaY: 15, screenSubtitleAreaWidth: 92, screenSubtitleAreaHeight: 6,
  largeBoxX: 4, largeBoxY: 22, largeBoxWidth: 92, largeBoxHeight: 66,
  largeBoxColor: "rgba(255,255,255,0.62)",
  entryGap: 18, entryPaddingX: 22, entryPaddingY: 18,
  entryBoxColor: "rgba(255,255,255,0.9)",
  nameFont: "Arial", nameSize: 32, nameWeight: "800", nameColor: "#071632",
  orgFont: "Arial", orgSize: 24, orgWeight: "400", orgColor: "#415276",
  signatureSize: 44,
  messageFont: "Arial", messageSize: 30, messageWeight: "800", messageColor: "#0752c9",
  timeFont: "Arial", timeSize: 20, timeWeight: "400", timeColor: "#1a2946",
  boothSelfieAreaEnabled: "yes", boothSelfieAreaX: 40, boothSelfieAreaY: 1710, boothSelfieAreaWidth: 1000, boothSelfieAreaHeight: 170,
  boothSelfieVisibleCount: 8, boothSelfieScrollSpeed: 40, boothSelfiePhotoWidth: 200, boothSelfiePhotoHeight: 150
};
function mergedSettings(s){ return Object.assign({}, DEFAULT_SETTINGS, s || {}); }
function safeCssUrl(url){ url=String(url||'').trim(); return url ? `url("${url.replace(/"/g,'%22')}")` : 'none'; }
function bgStyle(color, image){ return image ? `${color} ${safeCssUrl(image)} center/cover no-repeat` : color; }

if(typeof db==='undefined'){document.body.insertAdjacentHTML('afterbegin','<div style="position:fixed;inset:0;z-index:9999;background:white;color:#b91c1c;padding:30px;font:20px Arial">Firebase is not initialized. Please check firebase-config-message.js.</div>'); throw new Error('Firebase db is not defined');}
const settingsRef=db.ref('visitorBook/settings'), entriesRef=db.ref('visitorBook/entries'), boothSelfiesRef=db.ref('visitorBook/boothSelfies');
let settings=mergedSettings(), entries=[], boothSelfies=[], bgTimer=null, bgIndex=0, bgActiveLayer='A';

function el(id){return document.getElementById(id);}
const stage=el('stage'), content=el('content');
function fitStage(){
  const w=stage.clientWidth||1;
  content.style.transform=`scale(${w/1080})`;
}
window.addEventListener('resize',fitStage);
new ResizeObserver(fitStage).observe(stage);
fitStage();

function applyBox(boxEl, prefix, fallback){
  boxEl.style.left=Number(settings[prefix+'X'] ?? fallback.x)+'px';
  boxEl.style.top=Number(settings[prefix+'Y'] ?? fallback.y)+'px';
  boxEl.style.width=Number(settings[prefix+'Width'] ?? fallback.w)+'px';
  boxEl.style.height=Number(settings[prefix+'Height'] ?? fallback.h)+'px';
}
const CANVAS_W=1080, CANVAS_H=1920;
function applyBoxPercent(boxEl, prefix, fallback){
  // settings values here are percent (0-100) of the 1080x1920 canvas, i.e. percent of the screen
  const xPct=Number(settings[prefix+'X'] ?? fallback.x);
  const yPct=Number(settings[prefix+'Y'] ?? fallback.y);
  const wPct=Number(settings[prefix+'Width'] ?? fallback.w);
  const hPct=Number(settings[prefix+'Height'] ?? fallback.h);
  boxEl.style.left=(xPct/100*CANVAS_W)+'px';
  boxEl.style.top=(yPct/100*CANVAS_H)+'px';
  boxEl.style.width=(wPct/100*CANVAS_W)+'px';
  boxEl.style.height=(hPct/100*CANVAS_H)+'px';
}
function applyTitleAreas(){
  applyBoxPercent(el('titleArea'),'screenTitleArea',{x:4,y:3,w:92,h:12});
  applyBoxPercent(el('subtitleArea'),'screenSubtitleArea',{x:4,y:15,w:92,h:6});
  const t=el('titleText'); t.textContent=settings.screenTitle; t.style.fontFamily=settings.screenTitleFont; t.style.fontSize=settings.screenTitleSize+'px'; t.style.fontWeight=settings.screenTitleWeight; t.style.color=settings.screenTitleColor;
  const s=el('subtitleText'); s.textContent=settings.screenSubtitle; s.style.fontFamily=settings.screenSubtitleFont; s.style.fontSize=settings.screenSubtitleSize+'px'; s.style.fontWeight=settings.screenSubtitleWeight; s.style.color=settings.screenSubtitleColor;
}
function applyLargeBox(){
  const box=el('largeBox');
  applyBoxPercent(box,'largeBox',{x:4,y:22,w:92,h:66});
  box.style.background=bgStyle(settings.largeBoxColor,'');
}
function applyBoothSelfieArea(){
  const area=el('boothSelfieArea');
  const enabled=settings.boothSelfieAreaEnabled!=='no';
  area.style.display=enabled?'block':'none';
  if(!enabled)return;
  applyBox(area,'boothSelfieArea',{x:40,y:1710,w:1000,h:170});
}
function applyBackground(){
  document.body.style.background=settings.screenBgColor;
  const imgs=String(settings.screenBgImages||'').split(/\n|,/).map(x=>x.trim()).filter(Boolean);
  if(bgTimer)clearInterval(bgTimer);
  const layerA=el('bgLayerA'), layerB=el('bgLayerB');
  if(imgs.length){
    const fadeSec=Math.max(0,Number(settings.screenBgFadeDuration ?? 1.5));
    function setBg(){
      const url=imgs[bgIndex%imgs.length]; bgIndex++;
      const nextLayer=bgActiveLayer==='A'?layerB:layerA, curLayer=bgActiveLayer==='A'?layerA:layerB;
      if(!url)return;
      nextLayer.style.transition=`opacity ${fadeSec}s ease`;
      curLayer.style.transition=`opacity ${fadeSec}s ease`;
      nextLayer.style.backgroundImage=`url("${url}")`;
      nextLayer.style.opacity='1';
      curLayer.style.opacity='0';
      bgActiveLayer=bgActiveLayer==='A'?'B':'A';
    }
    setBg();
    bgTimer=setInterval(setBg,Math.max(1,Number(settings.screenBgInterval||10))*1000);
  } else { layerA.style.opacity='0'; layerB.style.opacity='0'; }
}
function messageColor(i){
  if(settings.messageColorMode==='random'){
    const p=String(settings.messageRandomPalette||'').split(',').map(x=>x.trim()).filter(Boolean);
    return p.length?p[i%p.length]:settings.messageFixedColor;
  }
  return settings.messageFixedColor;
}
function fmtTime(ts){
  if(!ts)return'';
  const d=new Date(ts);
  return d.toLocaleString();
}
function entryHtml(e,i){
  const sigOrHand = e.messageMode==='handwriting' && e.messageImage
    ? `<img class="handwrittenMessage" src="${e.messageImage}" alt="handwritten message">`
    : `<div class="message" style="font-family:${settings.messageFont};font-size:${settings.messageSize}px;font-weight:${settings.messageWeight};color:${messageColor(i)}">${(e.message||'').replace(/</g,'&lt;')}</div>`;
  const sig = e.signature ? `<div class="signature"><img src="${e.signature}" alt="signature" style="max-height:${settings.signatureSize}px"></div>` : '<div></div>';
  return `<div class="entry" style="background:${bgStyle(settings.entryBoxColor,'')};padding:${settings.entryPaddingY}px ${settings.entryPaddingX}px;margin-bottom:${settings.entryGap}px">
    <div class="rowTop">
      <div class="name" style="font-family:${settings.nameFont};font-size:${settings.nameSize}px;font-weight:${settings.nameWeight};color:${settings.nameColor}">${(e.name||'').replace(/</g,'&lt;')}</div>
      <div class="org" style="font-family:${settings.orgFont};font-size:${settings.orgSize}px;font-weight:${settings.orgWeight};color:${settings.orgColor}">${(e.organization||'').replace(/</g,'&lt;')}</div>
    </div>
    ${sigOrHand}
    <div class="metaRow">
      ${sig}
      <div class="time" style="font-family:${settings.timeFont};font-size:${settings.timeSize}px;font-weight:${settings.timeWeight};color:${settings.timeColor}">${fmtTime(e.createdAt)}</div>
    </div>
  </div>`;
}

let scrollRaf=null, scrollY=0, listInnerHeight=0;
function renderList(){
  const list=el('list');
  const visible=Math.max(1,Number(settings.visibleEntryCount||5));
  const shown=entries.filter(e=>e.showOnScreen!==false).slice(-Math.max(visible*4,30)).reverse();
  if(!shown.length){ list.innerHTML='<div style="padding:40px;text-align:center;color:#51617f;font-size:26px">Waiting for the first message…</div>'; if(scrollRaf){cancelAnimationFrame(scrollRaf);scrollRaf=null;} list.style.transform='translateY(0)'; return; }
  const html=shown.map((e,i)=>entryHtml(e,i)).join('');
  if(settings.scrollEnabled==='yes'){
    list.innerHTML=html+html; // duplicate for seamless loop
    requestAnimationFrame(()=>{
      listInnerHeight=list.scrollHeight/2;
      startScroll();
    });
  } else {
    list.innerHTML=shown.slice(0,visible).map((e,i)=>entryHtml(e,i)).join('');
    if(scrollRaf){cancelAnimationFrame(scrollRaf);scrollRaf=null;}
    list.style.transform='translateY(0)';
  }
}
function startScroll(){
  if(scrollRaf)cancelAnimationFrame(scrollRaf);
  const list=el('list');
  let last=performance.now();
  const speed=Math.max(5,Number(settings.scrollSpeed||60)); // px/sec at 1080-wide reference
  function step(now){
    const dt=(now-last)/1000; last=now;
    scrollY+=speed*dt;
    if(listInnerHeight>0 && scrollY>=listInnerHeight) scrollY-=listInnerHeight;
    // downward scroll: content starts shifted up by one full set and moves down, wrapping seamlessly
    list.style.transform=`translateY(${scrollY-listInnerHeight}px)`;
    scrollRaf=requestAnimationFrame(step);
  }
  scrollRaf=requestAnimationFrame(step);
}

let selfieScrollRaf=null, selfieScrollX=0, selfieInnerWidth=0;
function renderBoothSelfies(){
  const wrap=el('boothSelfieList');
  const count=Math.max(1,Number(settings.boothSelfieVisibleCount||8));
  const shown=boothSelfies.slice(0,count);
  const w=Number(settings.boothSelfiePhotoWidth||200), h=Number(settings.boothSelfiePhotoHeight||150);
  if(!shown.length){ wrap.innerHTML=''; if(selfieScrollRaf){cancelAnimationFrame(selfieScrollRaf);selfieScrollRaf=null;} return; }
  const html=shown.map(s=>`<div class="boothSelfiePhoto" style="width:${w}px;height:${h}px"><img src="${s.image}" alt="booth selfie"></div>`).join('');
  wrap.innerHTML=html+html;
  requestAnimationFrame(()=>{
    selfieInnerWidth=wrap.scrollWidth/2;
    startSelfieScroll();
  });
}
function startSelfieScroll(){
  if(selfieScrollRaf)cancelAnimationFrame(selfieScrollRaf);
  const wrap=el('boothSelfieList');
  let last=performance.now();
  const speed=Math.max(5,Number(settings.boothSelfieScrollSpeed||40));
  function step(now){
    const dt=(now-last)/1000; last=now;
    selfieScrollX+=speed*dt;
    if(selfieInnerWidth>0 && selfieScrollX>=selfieInnerWidth) selfieScrollX-=selfieInnerWidth;
    wrap.style.transform=`translateX(${-selfieScrollX}px)`;
    selfieScrollRaf=requestAnimationFrame(step);
  }
  selfieScrollRaf=requestAnimationFrame(step);
}

function applySettings(){
  applyBackground();
  applyTitleAreas();
  applyLargeBox();
  applyBoothSelfieArea();
  renderList();
  renderBoothSelfies();
}
settingsRef.on('value',snap=>{settings=mergedSettings(snap.val());applySettings();});
entriesRef.on('value',snap=>{const v=snap.val()||{};entries=Object.keys(v).map(k=>Object.assign({key:k},v[k])).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));renderList();});
boothSelfiesRef.on('value',snap=>{const v=snap.val()||{};boothSelfies=Object.keys(v).map(k=>Object.assign({key:k},v[k])).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));renderBoothSelfies();});

el('fullscreenBtn').onclick=async()=>{try{if(!document.fullscreenElement)await document.documentElement.requestFullscreen(); else await document.exitFullscreen();}catch(e){alert('이 브라우저에서는 Full Screen 모드를 사용할 수 없습니다.');}};
document.addEventListener('fullscreenchange',()=>{el('fullscreenBtn').textContent=document.fullscreenElement?'Exit Full Screen':'Full Screen';});
</script></body></html>
